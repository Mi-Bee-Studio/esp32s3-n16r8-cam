<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiBee Cam</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- Status Bar -->
        <div id="status-bar" class="status-bar">
            <span class="badge" id="badge-wifi" data-i18n="status.wifi">WiFi</span>
            <span class="badge" id="badge-ip">--</span>
            <span class="badge" id="badge-resolution" data-i18n="status.resolution">--</span>
            <span class="badge" id="badge-quality" data-i18n="status.quality">--</span>
            <span class="badge" id="badge-heap" data-i18n="status.heap">--</span>
            <span class="badge" id="badge-psram" data-i18n="status.psram">--</span>
            <span class="badge" id="badge-clients" data-i18n="status.clients">0</span>
            <span class="badge" id="badge-ai" data-i18n="status.ai">AI</span>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Stream Area -->
            <div class="stream-area" id="stream-area">
                <img id="stream-img" class="stream-img" src="/stream" alt="Camera Stream">
                <canvas id="stream-overlay" class="stream-overlay" width="640" height="480"></canvas>
                <div id="stream-status" class="hidden" data-i18n="stream.connecting">Connecting&hellip;</div>
            </div>

            <!-- Settings Panel -->
            <div class="settings-panel" id="settings-panel">
                <!-- Tab Navigation -->
                <div class="settings-tabs" id="settings-tabs">
                    <button class="settings-tab active" data-tab="camera" data-i18n="section.camera">Camera</button>
                    <button class="settings-tab" data-tab="ai" data-i18n="section.ai_features">AI Features</button>
                    <button class="settings-tab" data-tab="flash" data-i18n="section.flash_led">Flash LED</button>
                    <button class="settings-tab" data-tab="network" data-i18n="section.wifi_config">WiFi</button>
                    <button class="settings-tab" data-tab="streaming" data-i18n="section.streaming">Streaming</button>
                    <button class="settings-tab" data-tab="system" data-i18n="section.system">System</button>
                </div>

                <!-- Camera Section -->
                <div class="settings-section active" id="section-camera">
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.framesize">Resolution</label>
                        <select id="cam-framesize">
                            <option value="0">96x96</option>
                            <option value="1">QQVGA 160x120</option>
                            <option value="2">128x128</option>
                            <option value="3">QCIF 176x144</option>
                            <option value="4">HQVGA 240x176</option>
                            <option value="5">240x240</option>
                            <option value="6">QVGA 320x240</option>
                            <option value="7">320x320</option>
                            <option value="8">CIF 400x296</option>
                            <option value="9">HVGA 480x320</option>
                            <option value="10" selected>VGA 640x480</option>
                            <option value="11">SVGA 800x600</option>
                            <option value="12">XGA 1024x768</option>
                            <option value="13">HD 1280x720</option>
                            <option value="14">SXGA 1280x1024</option>
                            <option value="15">UXGA 1600x1200</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.quality">JPEG Quality</label>
                        <div class="slider-row">
                            <input type="range" id="cam-quality" min="0" max="63" value="12">
                            <span class="slider-value" id="cam-quality-val">12</span>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.brightness">Brightness</label>
                        <div class="slider-row">
                            <input type="range" id="cam-brightness" min="-2" max="2" value="0" step="1">
                            <span class="slider-value" id="cam-brightness-val">0</span>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.contrast">Contrast</label>
                        <div class="slider-row">
                            <input type="range" id="cam-contrast" min="-2" max="2" value="0" step="1">
                            <span class="slider-value" id="cam-contrast-val">0</span>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.saturation">Saturation</label>
                        <div class="slider-row">
                            <input type="range" id="cam-saturation" min="-2" max="2" value="0" step="1">
                            <span class="slider-value" id="cam-saturation-val">0</span>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="camera.sharpness">Sharpness</label>
                        <div class="slider-row">
                            <input type="range" id="cam-sharpness" min="-2" max="2" value="0" step="1">
                            <span class="slider-value" id="cam-sharpness-val">0</span>
                        </div>
                    </div>
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="camera.hmirror">Horizontal Mirror</label>
                        <div class="toggle" id="cam-hmirror" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="camera.vflip">Vertical Flip</label>
                        <div class="toggle" id="cam-vflip" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                </div>

                <!-- AI Section -->
                <div class="settings-section" id="section-ai">
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="ai.face">Face Detection</label>
                        <div class="toggle" id="ai-face" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="ai.motion">Motion Detection</label>
                        <div class="toggle" id="ai-motion" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="ai.qr">QR Code</label>
                        <div class="toggle" id="ai-qr" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <div class="setting-group">
                        <p class="setting-description" data-i18n="ai.note">AI requires VGA resolution (640x480)</p>
                    </div>
                </div>

                <!-- Flash LED Section -->
                <div class="settings-section" id="section-flash">
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="flash.brightness">LED Brightness</label>
                        <div class="slider-row">
                            <input type="range" id="led-brightness" min="0" max="100" value="0">
                            <span class="slider-value" id="led-brightness-val">0</span>
                        </div>
                    </div>
                </div>

                <!-- Network Section -->
                <div class="settings-section" id="section-network">
                    <div class="setting-group">
                        <label data-i18n="network.ssid_label">SSID</label>
                        <input type="text" id="wifi-ssid" data-i18n-placeholder="network.ssid_placeholder" placeholder="Network name">
                    </div>
                    <div class="setting-group">
                        <label data-i18n="network.password_label">Password</label>
                        <input type="password" id="wifi-pass" data-i18n-placeholder="network.password_placeholder" placeholder="Leave blank to keep current">
                    </div>
                    <button class="btn-primary" id="btn-wifi-save" data-i18n="network.save">Save &amp; Reboot</button>
                </div>

                <!-- Streaming Section -->
                <div class="settings-section" id="section-streaming">
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="streaming.rtsp_user">RTSP Username</label>
                        <input type="text" id="rtsp-user" placeholder="admin">
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="streaming.rtsp_pass">RTSP Password</label>
                        <input type="password" id="rtsp-pass" placeholder="Password">
                    </div>
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="streaming.onvif">ONVIF Discovery</label>
                        <div class="toggle" id="onvif-enable" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <button class="btn-primary" id="btn-streaming-save" data-i18n="btn.save">Save</button>
                </div>

                <!-- System Section -->
                <div class="settings-section" id="section-system">
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="system.uptime">Uptime</label>
                        <span id="sys-uptime">--</span>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="system.free_heap">Free Heap</label>
                        <span id="sys-heap">--</span>
                    </div>
                    <div class="setting-group">
                        <label class="setting-label" data-i18n="system.free_psram">Free PSRAM</label>
                        <span id="sys-psram">--</span>
                    </div>
                    <!-- Theme toggle -->
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="theme.toggle">Dark / Light</label>
                        <div class="toggle" id="toggle-theme" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                    <!-- Language toggle -->
                    <div class="setting-group flex-row flex-between">
                        <label class="setting-label" data-i18n="lang.toggle">EN / 中文</label>
                        <div class="toggle" id="toggle-lang" role="switch" aria-checked="false" tabindex="0"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/i18n.js"></script>
    <script src="/app.js"></script>
</body>
</html>
